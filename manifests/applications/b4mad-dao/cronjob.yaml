apiVersion: batch/v1
kind: CronJob
metadata:
  name: dao-governance
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
          containers:
            - name: dao-governance
              image: b4mad-dao-contracts
              command: ["node", "scripts/e2e-governance.mjs"]
              envFrom:
                - configMapRef:
                    name: dao-config
                - secretRef:
                    name: dao-deployer-key
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
