---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: keycloak
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/instance: b4mad-erdgeschoss
      app.kubernetes.io/component: server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pooler
spec:
  minAvailable: 0
  selector:
    matchLabels:
      cnpg.io/poolerName: pooler-postgresql
      cnpg.io/podRole: pooler
