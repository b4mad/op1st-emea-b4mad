apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: b4mad-matrix

commonLabels:
  app.kubernetes.io/name: matrix
  app.kubernetes.io/managed-by: op1st-emea-b4mad
  app.kubernetes.io/component: dendrite

resources:
  - serviceaccount.yaml

  # postgresql.yaml + aws-creds.yaml released to codeberg.org/b4mad/b4mad-matrix
  # (Cluster prod, Pooler prod-pooler, ScheduledBackup prod-daily, and the S3
  # backup creds Secret are now owned by the b4mad-matrix Application). The
  # files remain on disk for git history and are deleted in a follow-up PR
  # once Phase 9 of the ESS migration retires the Dendrite tree wholesale.

  - deployment.yaml
  - ingress.yaml
  - pvc.yaml
  #  - secrets/dendrite-conf.yaml
  #  - secrets/rest.yaml
  - service.yaml
  - monitoring_and_alertings.yaml

images:
  - name: dendrite-monolith
    newName: ghcr.io/element-hq/dendrite-monolith
    newTag: v0.15.2
