apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: b4mad-meshtastic-gateway

resources:
  - perses-oauth.yaml     # SealedSecret with OIDC creds (chart env-var keys)
  - server-0.21.0.yaml    # rendered perses/perses Helm chart (server-only)

  # NOT listed (deliberately):
  # - perses-oauth.enc.yaml         SOPS source-of-truth, consumed by operators
  # - serviceaccount-token.yaml     ClusterRoleBinding — out of AppProject scope,
  #                                 applied by cluster-admin via oc apply. See
  #                                 the file header for the replay command. The
  #                                 thanos-reader SA it creates is reserved for
  #                                 a future datasource-provisioning ConfigMap.
