apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: b4mad-meshtastic-gateway

resources:
  - perses-oauth.yaml               # SealedSecret with OIDC creds (chart env-var keys)
  - server-0.21.0.yaml              # rendered perses/perses Helm chart (server-only)
  - meshtastic-dashboard.yaml       # ConfigMap: Perses project + 12-panel dashboard body
  - bridge-host-cpu-dashboard.yaml  # ConfigMap: nostromo-cluster-health project + bridge HostCPU dashboard
  - nostromo-cluster-health-datasource.yaml  # ConfigMap: project-scoped Datasource for nostromo-cluster-health (refs the GlobalSecret 'thanos-auth')
  - prometheus-datasource.yaml      # SealedSecret: Perses Datasource with thanos bearer token

  # NOT listed (deliberately):
  # - perses-oauth.enc.yaml              SOPS source-of-truth, consumed by operators
  # - prometheus-datasource.enc.yaml     SOPS source-of-truth for the above
  # - serviceaccount-token.yaml          ClusterRoleBinding — out of b4mad
  #                                      AppProject scope, applied by cluster-admin
  #                                      via oc apply. The thanos-reader SA it
  #                                      creates issues the bearer token baked
  #                                      into prometheus-datasource.yaml above.
