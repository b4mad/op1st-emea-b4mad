# ────────────────────────────────────────────────────────────────────────────
# ONE-SHOT, APPLIED BY HAND — NOT IN ANY KUSTOMIZATION
#
# The b4mad Argo AppProject's clusterResourceWhitelist permits only Namespace
# and argoproj.io/* kinds at the cluster scope. ClusterRoleBinding is rejected,
# so this file is deliberately out of the perses/kustomization.yaml resources
# list and applied out-of-band by a cluster-admin. Replay from the repo with:
#
#   oc apply -f manifests/applications/b4mad-meshtastic-gateway/perses/serviceaccount-token.yaml
#
# After apply, the SA-token controller writes a JWT into the Secret
# `perses-thanos-reader-token`; a separate post-deploy copy step populates
# `perses-thanos-bearer` (synced by Argo as an empty-data shim) with that JWT.
# See the plan file in Systems: docs/superpowers/plans/2026-04-21-perses-dashboarding.md
# (Task 5 + Task 8.4).
# ────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: perses-thanos-reader
  namespace: b4mad-meshtastic-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-thanos-reader-cluster-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: perses-thanos-reader
    namespace: b4mad-meshtastic-gateway
---
# Kubernetes 1.24+ does not auto-create service-account tokens; we ask for one
# explicitly via a Secret with the token-controller annotation. The resulting
# Secret holds a JWT under data.token that we will later project into Perses.
apiVersion: v1
kind: Secret
metadata:
  name: perses-thanos-reader-token
  namespace: b4mad-meshtastic-gateway
  annotations:
    kubernetes.io/service-account.name: perses-thanos-reader
type: kubernetes.io/service-account-token
