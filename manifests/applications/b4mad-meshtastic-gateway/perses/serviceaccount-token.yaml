---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: perses-thanos-reader
  namespace: b4mad-meshtastic-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perses-thanos-reader-cluster-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: perses-thanos-reader
    namespace: b4mad-meshtastic-gateway
---
# Kubernetes 1.24+ does not auto-create service-account tokens; we ask for one
# explicitly via a Secret with the token-controller annotation. The resulting
# Secret holds a JWT under data.token that we will later project into Perses.
apiVersion: v1
kind: Secret
metadata:
  name: perses-thanos-reader-token
  namespace: b4mad-meshtastic-gateway
  annotations:
    kubernetes.io/service-account.name: perses-thanos-reader
type: kubernetes.io/service-account-token
