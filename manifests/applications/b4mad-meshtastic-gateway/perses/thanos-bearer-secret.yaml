apiVersion: v1
kind: Secret
metadata:
  name: perses-thanos-bearer
  namespace: b4mad-meshtastic-gateway
  annotations:
    # Tell Argo not to fight us when we populate the data field out-of-band.
    # This Secret's data is initialized by an operator-run script post-deploy;
    # Argo will treat it as reconciled to its empty-spec view.
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
# Intentionally empty data block — populated by the post-deploy script.
stringData: {}
