apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: b4mad-epaper-service-tekton-secrets
  namespace: op1st-gitops
spec:
  destination:
    namespace: op1st-pipelines
    server: https://api.nostromo.erdgeschoss.b4mad.emea.operate-first.cloud:6443
  project: op1st
  source:
    repoURL: https://codeberg.org/goern/epaper-service
    targetRevision: main
    path: .tekton/secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
