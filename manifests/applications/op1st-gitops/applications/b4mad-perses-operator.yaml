apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: b4mad-perses-operator
  namespace: op1st-gitops
  annotations:
    # Sync first on a full repo resync so CRDs exist before the
    # b4mad-meshtastic-gateway Application tries to create Perses/PersesDashboard CRs.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  destination:
    namespace: b4mad-meshtastic-gateway
    server: https://api.nostromo.erdgeschoss.b4mad.emea.operate-first.cloud:6443
  project: b4mad
  source:
    repoURL: https://perses.dev/helm-charts
    chart: perses-operator
    targetRevision: "*"
    helm:
      releaseName: perses-op
      valuesObject:
        manager:
          replicas: 1
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
        # The kube-rbac-proxy sidecar ships by default; OCP is fine with it.
        rbacHelpers:
          # We don't need the admin/editor/viewer convenience ClusterRoles.
          enable: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # The chart's CRDs carry helm.sh/resource-policy: keep. ServerSideApply
      # avoids conflicts on CRDs that other controllers (cert-manager CA inject)
      # also mutate.
      - ServerSideApply=true
      - CreateNamespace=false
      # The Operator registers a conversion webhook backed by a cert-manager
      # cluster-issuer the chart owns. Argo should not prune the Certificate
      # or Issuer the chart creates; none of these are selfHealed-away.
