apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: op1st-reflector
  namespace: openshift-gitops
spec:
  destination:
    namespace: op1st-reflector
    server: https://kubernetes.default.svc
  project: op1st
  source:
    chart: reflector
    repoURL: https://emberstack.github.io/helm-charts
    targetRevision: 10.0.42
    helm:
      releaseName: reflector
      # NOTE: use 'values' (string), not 'valuesObject' (typed JSON).
      # The Argo CRD prunes explicit null values from valuesObject at
      # apiserver storage time, which causes runAsUser:null / fsGroup:null
      # to vanish and the chart defaults (1000 / 2000) to win the merge.
      # OpenShift's restricted-v2 SCC then rejects the pod (UIDs outside
      # the namespace allocator range). Passing values as a YAML string
      # bypasses the null-stripping.
      values: |
        installCRDs: false
        rbac:
          create: true
        serviceAccount:
          create: true
        podSecurityContext:
          fsGroup: null
        securityContext:
          runAsUser: null
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 3
