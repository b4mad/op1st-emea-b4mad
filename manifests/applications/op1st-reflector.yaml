apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reflector
  namespace: openshift-gitops
spec:
  destination:
    namespace: op1st-reflector
    server: https://kubernetes.default.svc
  project: op1st
  source:
    chart: reflector
    repoURL: https://emberstack.github.io/helm-charts
    targetRevision: 10.0.42
    helm:
      releaseName: reflector
      valuesObject:
        installCRDs: false
        rbac:
          create: true
        serviceAccount:
          create: true
        # OpenShift assigns UID/GID from the project's allocated range.
        # Clear chart defaults (runAsUser:1000 / fsGroup:2000) that fall
        # outside the namespace UID range and are rejected by restricted-v2.
        podSecurityContext: {}
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 3
